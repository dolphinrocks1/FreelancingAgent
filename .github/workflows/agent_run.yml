name: Run Searcher Agent

on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Playwright and system-level deps removed to fix installation errors

      - name: Run Searcher Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python searcher.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Scout-Bot"
          git config --global user.email "bot@github.com"
          git add data/jobs.csv
          # The '|| exit 0' prevents the action from failing if there are no new leads
          git commit -m "Automated Scout Run: $(date)" || exit 0
          git push
