name: build
on:
  workflow_dispatch:
    inputs:
      service_type:
        description: 'Target Niche'
        required: true
        default: 'Cyber Security'
  schedule:
    - cron: '0 */3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Searcher Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Pass the input niche to the script
        run: python searcher.py "${{ github.event.inputs.service_type || 'Cyber Security' }}"
      - name: Commit and Push Results
        run: |
          git config --global user.name "Scout-Bot"
          git config --global user.email "bot@scout.ai"
          git add data/jobs.csv
          git commit -m "[$(date +'%d %b %H:%M')] Automated Scout Run" || echo "No changes"
          git push
