name: build
on:
  workflow_dispatch:
    inputs:
      service_type:
        description: 'Target Niche'
        required: true
        default: 'Cyber Security'
  schedule:
    - cron: '0 */3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pandas sqlalchemy psycopg2-binary tavily-python
      - name: Run Search
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python searcher.py "${{ github.event.inputs.service_type || 'Cyber Security' }}"
