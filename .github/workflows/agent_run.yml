name: Hourly SIEM/SOAR Scout

on:
  schedule:
    - cron: '0 */3 * * *'  # Runs at the start of every hour
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # 1. Manually install every library Playwright needs for Chromium on Ubuntu 24.04
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxtst6 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libatk1.0-0 \
            libcairo-gobject2 \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libglib2.0-0
            
          # 2. Install ONLY the browser binaries (skip the failing --with-deps check)
          playwright install chromium
      
      - name: Run Searcher Agent
        run: python searcher.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push Results
        run: |
          git config --global user.name "Scout-Bot"
          git config --global user.email "bot@scout.com"
          git add data/last_run.txt data/jobs.csv
          # The '|| true' ensures the workflow doesn't fail if there's nothing to change
          git commit -m "Automated Scout Run: $(date)" || echo "No changes to commit"
          git push
